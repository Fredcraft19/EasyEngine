<!DOCTYPE html>

<html>
    <head>

        <title id="tt">Loading Editor..</title>
        <link rel="icon" type="image/png" href="ui/icon.png">

        <link rel="stylesheet" href="ui/style.css">
        <script src="engine/loader.js"></script>

    </head>

    <body>
        <p class="tiny">|</p>
        <div class="main">

            <div class="hierarchy" id="hierarchy">

                <h1>Hierarchy</h1>
                <button id="new-go" class="no-margin-far-right">New</button>

            </div>

            <div class="center-area">

                <div class="game-controls">
                    <p class="tiny">|</p>
                    <p class="medium-text" id="tv">Loading..</p>
                    <p>|</p>
                    <button id="build">Build</button>
                    <button id="save">Save</button>
                    <button id="load">Load</button>
                    <p>|</p>
                    <button id="play">Play</button>
                    <button id="pause">Pause</button>
                    <p>|</p>
                    <p id="fps_count" class="small-text">FPS: -</p>
                </div>

                <div class="gameview" id="gameview">
                    <canvas id="canvas" width="640" height="360"></canvas>
                </div>


                <div class="asset-area" id="asset-parent">
                    <h1>Assets</h1>

                    <div class = "asset-parent" id="assets">
                        
                    </div>
                </div>


            </div>

            <div class="inspector" id="inspector-parent" disabled>
                <h1>Inspector</h1>

                <div class="inspector-object">

                    <div class="inspector-base" id="inspector-base">
                        <div class="inspector-base2">
                            <input id="go-name"> Name
                            <p class="tiny">|</p>
                            <input id="go-tag"> Tag
                            <p class="tiny">|</p>
                        </div>
                        <input type="checkbox" id="go-enabled"> WIP-Enabled
                    </div>

                    <div id="inspecter-components">
                    </div>
                </div>
            </div>

        </div>

        <p class="tiny">|</p>

        <script src="ui/editor.js"></script>
    </body>

</html>
